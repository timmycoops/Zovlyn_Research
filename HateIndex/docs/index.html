function quadrant(x, y) {
  if (x >= 100 && y >= 100) return 'Leading';
  if (x < 100 && y >= 100) return 'Improving';
  if (x < 100 && y < 100) return 'Lagging';
  return 'Weakening';
}
function rotationStatus(tail) {
  const startQ = quadrant(tail[0][0], tail[0][1]);
  const endQ = quadrant(tail[tail.length - 1][0], tail[tail.length - 1][1]);
  return startQ === endQ ? endQ : `${startQ}→${endQ}`;
}

function genSparkline(seed, drift, current) {
  const points = []; let x = current - 104 * drift - 2; let rng = seed;
  for (let i = 0; i < 104; i++) {
    rng = (rng * 9301 + 49297) % 233280;
    const noise = (rng / 233280 - 0.5) * 0.6;
    x = x + drift + noise * 0.15;
    points.push({ w: i, v: +x.toFixed(2) });
  }
  points[points.length - 1].v = current;
  return points;
}

function buildAugmented(rawArray, rrgMap, sparklines) {
  const sorted = [...rawArray]
    .map(d => ({ ...d, score: +(d.drawdown + d.momentum + d.positioning + d.flows + d.valuation + d.sentiment).toFixed(2) }))
    .sort((a, b) => b.score - a.score);
  return sorted.map(d => {
    const tail = rrgMap[d.name] || [[100,100],[100,100],[100,100],[100,100],[100,100],[100,100]];
    const status = rotationStatus(tail);
    const justEntered = status.includes('→Improving') || status.includes('→Leading');
    return { ...d, tail, status, justEntered, history: sparklines[d.name] };
  });
}

// ─── Helpers ─────────────────────────────────────────────────────────────
const fmtScore = (v) => (v > 0 ? '+' : '') + v.toFixed(2);
function colorForScore(score) {
  if (score >= 8) return BRAND.orange;
  if (score >= 4) return BRAND.pink;
  if (score >= 0) return BRAND.purple;
  return BRAND.blue;
}
function HateBadge({ score }) {
  let label, bg, fg;
  if (score >= 8) { label = 'CAPITULATION'; bg = '#F95B3D33'; fg = BRAND.orange; }
  else if (score >= 4) { label = 'HATED'; bg = '#FEB7C71F'; fg = BRAND.pink; }
  else if (score >= 0) { label = 'NEUTRAL'; bg = '#6B7ACC22'; fg = BRAND.purple; }
  else if (score >= -3) { label = 'LIKED'; bg = '#4654A322'; fg = BRAND.blue; }
  else { label = 'EUPHORIC'; bg = '#4ADE8022'; fg = BRAND.green; }
  return <span style={{ background: bg, color: fg, padding: '2px 8px', borderRadius: 3, fontFamily: 'JetBrains Mono', fontSize: 9, fontWeight: 600, letterSpacing: '0.08em' }}>{label}</span>;
}
function Sparkline({ data, color }) {

  );
}

// ─── RRG ────────────────────────────────────────────────────────────────
function RRGPanel({ data, selected, setSelected }) {
  const W = 1100, H = 540;
  const PAD = { top: 30, right: 30, bottom: 50, left: 60 };
  const CHART_W = W - PAD.left - PAD.right;
  const CHART_H = H - PAD.top - PAD.bottom;
  const X_MIN = 76, X_MAX = 124, Y_MIN = 76, Y_MAX = 124;
  const xScale = (x) => PAD.left + ((x - X_MIN) / (X_MAX - X_MIN)) * CHART_W;
  const yScale = (y) => PAD.top + (1 - (y - Y_MIN) / (Y_MAX - Y_MIN)) * CHART_H;
  const cx = xScale(100), cy = yScale(100);

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto', display: 'block' }}>
      <defs>
        <radialGradient id="leadingGlow" cx="0.5" cy="0.5" r="0.5">
          <stop offset="0%" stopColor={BRAND.green} stopOpacity="0.1" />
          <stop offset="100%" stopColor={BRAND.green} stopOpacity="0" />
        </radialGradient>
        <radialGradient id="improvingGlow" cx="0.5" cy="0.5" r="0.5">
          <stop offset="0%" stopColor={BRAND.orange} stopOpacity="0.1" />
          <stop offset="100%" stopColor={BRAND.orange} stopOpacity="0" />
        </radialGradient>
      </defs>
      <rect x={PAD.left} y={PAD.top} width={cx - PAD.left} height={cy - PAD.top} fill={`${BRAND.orange}08`} />
      <rect x={cx} y={PAD.top} width={PAD.left + CHART_W - cx} height={cy - PAD.top} fill={`${BRAND.green}0A`} />
      <rect x={PAD.left} y={cy} width={cx - PAD.left} height={PAD.top + CHART_H - cy} fill={`${BRAND.purple}06`} />
      <rect x={cx} y={cy} width={PAD.left + CHART_W - cx} height={PAD.top + CHART_H - cy} fill={`${BRAND.pink}06`} />
      <rect x={PAD.left} y={PAD.top} width={cx - PAD.left} height={cy - PAD.top} fill="url(#improvingGlow)" />
      <rect x={cx} y={PAD.top} width={PAD.left + CHART_W - cx} height={cy - PAD.top} fill="url(#leadingGlow)" />

      {[80, 86, 92, 108, 114, 120].map(v => (
        <g key={`gx${v}`}>
          <line x1={xScale(v)} y1={PAD.top} x2={xScale(v)} y2={PAD.top + CHART_H} stroke={BRAND.border} strokeOpacity={0.4} strokeDasharray="2 4" />
          <text x={xScale(v)} y={PAD.top + CHART_H + 16} fill={BRAND.textDim} fontSize={9} textAnchor="middle" fontFamily="JetBrains Mono">{v}</text>
        </g>
      ))}
      {[80, 86, 92, 108, 114, 120].map(v => (
        <g key={`gy${v}`}>
          <line x1={PAD.left} y1={yScale(v)} x2={PAD.left + CHART_W} y2={yScale(v)} stroke={BRAND.border} strokeOpacity={0.4} strokeDasharray="2 4" />
          <text x={PAD.left - 8} y={yScale(v) + 3} fill={BRAND.textDim} fontSize={9} textAnchor="end" fontFamily="JetBrains Mono">{v}</text>
        </g>
      ))}
      <line x1={PAD.left} y1={cy} x2={PAD.left + CHART_W} y2={cy} stroke={BRAND.textMute} strokeWidth={1} strokeOpacity={0.6} />
      <line x1={cx} y1={PAD.top} x2={cx} y2={PAD.top + CHART_H} stroke={BRAND.textMute} strokeWidth={1} strokeOpacity={0.6} />

      <text x={PAD.left + 14} y={PAD.top + 22} fill={BRAND.orange} fontSize={11} fontFamily="JetBrains Mono" fontWeight={600} letterSpacing="0.15em">IMPROVING</text>
      <text x={PAD.left + 14} y={PAD.top + 36} fill={BRAND.textDim} fontSize={9} fontFamily="JetBrains Mono">underperforming · accelerating</text>
      <text x={PAD.left + CHART_W - 14} y={PAD.top + 22} fill={BRAND.green} fontSize={11} fontFamily="JetBrains Mono" fontWeight={600} letterSpacing="0.15em" textAnchor="end">LEADING</text>
      <text x={PAD.left + CHART_W - 14} y={PAD.top + 36} fill={BRAND.textDim} fontSize={9} fontFamily="JetBrains Mono" textAnchor="end">outperforming · accelerating</text>
      <text x={PAD.left + 14} y={PAD.top + CHART_H - 14} fill={BRAND.purple} fontSize={11} fontFamily="JetBrains Mono" fontWeight={600} letterSpacing="0.15em">LAGGING</text>
      <text x={PAD.left + 14} y={PAD.top + CHART_H - 28} fill={BRAND.textDim} fontSize={9} fontFamily="JetBrains Mono">underperforming · decelerating</text>
      <text x={PAD.left + CHART_W - 14} y={PAD.top + CHART_H - 14} fill={BRAND.pink} fontSize={11} fontFamily="JetBrains Mono" fontWeight={600} letterSpacing="0.15em" textAnchor="end">WEAKENING</text>
      <text x={PAD.left + CHART_W - 14} y={PAD.top + CHART_H - 28} fill={BRAND.textDim} fontSize={9} fontFamily="JetBrains Mono" textAnchor="end">outperforming · decelerating</text>

      <text x={PAD.left + CHART_W / 2} y={H - 12} fill={BRAND.textMute} fontSize={10} textAnchor="middle" fontFamily="JetBrains Mono" letterSpacing="0.1em">JdK RS-RATIO →</text>

      {data.map(d => {
        const isSelected = selected === d.name;
        const isDimmed = selected && !isSelected;
        const opacity = isDimmed ? 0.12 : 1;
        const baseColor = colorForScore(d.score);
        const last = d.tail[d.tail.length - 1];
        const isHated = d.score >= 4;
        const isCapit = d.score >= 8;
        const segments = [];
        for (let i = 0; i < d.tail.length - 1; i++) {
          segments.push({
            x1: xScale(d.tail[i][0]), y1: yScale(d.tail[i][1]),
            x2: xScale(d.tail[i + 1][0]), y2: yScale(d.tail[i + 1][1]),
            opacity: 0.25 + (i / d.tail.length) * 0.6,
            width: 1 + (i / d.tail.length) * 1.5,
          });

        return (
          <g key={d.name} opacity={opacity}
             onMouseEnter={() => setSelected(d.name)}
             onMouseLeave={() => setSelected(null)}
             style={{ cursor: 'pointer', transition: 'opacity 0.15s' }}>
            {segments.map((s, i) => (
              <line key={i} x1={s.x1} y1={s.y1} x2={s.x2} y2={s.y2}
                    stroke={baseColor} strokeWidth={isSelected ? s.width + 1 : s.width}
                    strokeOpacity={s.opacity} strokeLinecap="round" />
            ))}
            {d.tail.slice(0, -1).map((p, i) => (
              <circle key={i} cx={xScale(p[0])} cy={yScale(p[1])} r={1.5}
                      fill={baseColor} opacity={0.3 + (i / d.tail.length) * 0.5} />

            {isCapit && <circle cx={xScale(last[0])} cy={yScale(last[1])} r={14} fill={baseColor} opacity={0.18} />}
            {isHated && !isCapit && <circle cx={xScale(last[0])} cy={yScale(last[1])} r={11} fill={baseColor} opacity={0.12} />}

                    r={isSelected ? 8 : isHated ? 6 : 4.5}
                    fill={baseColor} stroke={BRAND.bg} strokeWidth={2} />

              // Smart label placement: flip the label to the opposite side when a point
              // sits near the chart edge so the ticker doesn't run off the panel.
              const EDGE = 5;  // data-units from edge that count as "near"
              const flipX = last[0] > X_MAX - EDGE;
              const flipY = last[1] < Y_MIN + EDGE;
              const dx = flipX ? -11 : 11;
              const dy = flipY ? -8  : 4;
              const anchor = flipX ? 'end' : 'start';
              return (
                <text x={xScale(last[0]) + dx} y={yScale(last[1]) + dy}
                      textAnchor={anchor}
                      fill={isSelected ? BRAND.text : BRAND.textMute}
                      fontSize={isSelected ? 12 : 10} fontFamily="JetBrains Mono"
                      fontWeight={isSelected ? 600 : 400}>
                  {d.ticker}
                </text>
              );
            })()}
          </g>
        );
      })}
    </svg>
  );
}

function ScoreHistoryChart({ history, score }) {
  if (!history || history.length === 0) return null;
  const W = 700, H = 140, P = { top: 12, right: 12, bottom: 22, left: 36 };
  const cw = W - P.left - P.right, ch = H - P.top - P.bottom;
  const ys = history.map(h => h.score);
  const yMin = Math.min(-2, ...ys) - 0.5;
  const yMax = Math.max(10, ...ys) + 0.5;
  const xScale = i => P.left + (i / (history.length - 1)) * cw;
  const yScale = y => P.top + (1 - (y - yMin) / (yMax - yMin)) * ch;
  const path = history.map((h, i) => `${i === 0 ? 'M' : 'L'}${xScale(i)},${yScale(h.score)}`).join(' ');
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto', display: 'block' }}>
      {[4, 8].map(t => (
        <g key={t}>
          <line x1={P.left} y1={yScale(t)} x2={P.left + cw} y2={yScale(t)}
                stroke={t === 8 ? BRAND.orange : BRAND.pink} strokeOpacity={0.5}
                strokeDasharray="3 4" />
          <text x={P.left + cw + 4} y={yScale(t) + 3} fontSize={9} fill={BRAND.textDim}
                fontFamily="JetBrains Mono">{t === 8 ? 'capitulation' : 'hated'}</text>
        </g>
      ))}
      <line x1={P.left} y1={yScale(0)} x2={P.left + cw} y2={yScale(0)}
            stroke={BRAND.textMute} strokeOpacity={0.4} />
      <path d={path} fill="none" stroke={BRAND.green} strokeWidth={1.5} />
      <text x={P.left} y={H - 6} fontSize={9} fill={BRAND.textDim} fontFamily="JetBrains Mono">
        {history[0].date} → {history[history.length - 1].date}
      </text>
      <text x={P.left - 8} y={yScale(yMax) + 4} fontSize={9} fill={BRAND.textDim}
            fontFamily="JetBrains Mono" textAnchor="end">{yMax.toFixed(1)}</text>
      <text x={P.left - 8} y={yScale(yMin) + 4} fontSize={9} fill={BRAND.textDim}
            fontFamily="JetBrains Mono" textAnchor="end">{yMin.toFixed(1)}</text>
    </svg>
  );
}

function ComponentBars({ components }) {
  const ORDER = ['drawdown', 'momentum', 'positioning', 'flows', 'valuation', 'sentiment'];
  const W = 700, H = 120, P = { top: 8, right: 60, bottom: 8, left: 100 };
  const rh = (H - P.top - P.bottom) / ORDER.length;
  const xRange = 3.5;  // bars span ±3.5 z-units
  const cx = P.left + (W - P.left - P.right) / 2;
  const xScale = z => cx + (z / xRange) * ((W - P.left - P.right) / 2);

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto', display: 'block' }}>
      <line x1={cx} y1={P.top} x2={cx} y2={H - P.bottom} stroke={BRAND.textMute} strokeOpacity={0.4} />
      {ORDER.map((name, i) => {
        const z = components[name];
        const y = P.top + i * rh;
        const isNull = z === null || z === undefined;
        const barEnd = isNull ? cx : xScale(z);
        return (
          <g key={name}>
            <text x={P.left - 8} y={y + rh / 2 + 4} fontSize={11}
                  fill={isNull ? BRAND.textDim : BRAND.text}
                  fontFamily="JetBrains Mono" textAnchor="end">{name}</text>
            {isNull ? (
              <rect x={cx - 1} y={y + 4} width={2} height={rh - 8}
                    fill={BRAND.textDim} opacity={0.3} />
            ) : (
              <rect x={Math.min(cx, barEnd)} y={y + 4}
                    width={Math.abs(barEnd - cx)} height={rh - 8}
                    fill={z >= 0 ? BRAND.green : BRAND.red} opacity={0.85} />
            )}
            <text x={W - P.right + 4} y={y + rh / 2 + 4} fontSize={10}
                  fill={isNull ? BRAND.textDim : BRAND.text}
                  fontFamily="JetBrains Mono">
              {isNull ? 'phase 7' : (z >= 0 ? '+' : '') + z.toFixed(2)}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

}

// ─── Backtest panel (FIG 05) ─────────────────────────────────────────────
function BacktestPanel() {
  const [tab, setTab] = useState('components');
  const [components, setComponents] = useState(null);
  const [signal, setSignal] = useState(null);

  useEffect(() => {
    fetch('./backtest_components.json')
      .then(r => r.ok ? r.json() : null)
      .then(setComponents)
      .catch(() => setComponents(null));
    fetch('./backtest.json')
      .then(r => r.ok ? r.json() : null)
      .then(setSignal)
      .catch(() => setSignal(null));
  }, []);

  if (!components && !signal) {
    return (
      <div style={{ padding: 24, color: BRAND.textDim, fontSize: 12, fontStyle: 'italic' }}>

      </div>
    );
  }

  return (
    <div>
      <div style={{ display: 'flex', gap: 18, borderBottom: `1px solid ${BRAND.border}`, paddingBottom: 8, marginBottom: 14 }}>
        {[
          ['components', 'Per-component'],
          ['composite',  'Composite'],
          ['signal',     'Signal P&L'],
        ].map(([id, label]) => (
          <button key={id} onClick={() => setTab(id)}
                  className="mono"
                  style={{
                    background: 'none', border: 'none', cursor: 'pointer',
                    color: tab === id ? BRAND.green : BRAND.textMute,
                    fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase',
                    padding: 0,
                  }}>

function Placeholder({ text }) {

}

function ComponentCalibrationGrid({ data }) {
  const components = ['drawdown', 'momentum', 'positioning', 'flows'];

        <div style={{ fontSize: 12, color: BRAND.textMute, lineHeight: 1.55, marginBottom: 10 }}>
          Each card buckets every historical observation into ten deciles by that component's z-score (decile 1 = lowest z, decile 10 = highest).
          Y-axis is the <span style={{ color: BRAND.text }}>mean forward return</span> on the commodity over the next N weeks.
          A signal is "worth tracking" if higher deciles (more "hated") consistently produce higher forward returns —
          i.e. the line goes <span style={{ color: BRAND.green }}>up and to the right</span>. A flat or downward line means the component isn't predictive in this direction.
        </div>

function CalibrationCard({ name, block }) {
  const W = 480, H = 200, P = { top: 14, right: 12, bottom: 28, left: 36 };
  const cw = W - P.left - P.right, ch = H - P.top - P.bottom;
  const horizons = [4, 13, 26, 52];
  const horizonColors = { 4: BRAND.purple, 13: BRAND.blue, 26: BRAND.orange, 52: BRAND.green };

  if (!block || !block.calibration || block.calibration.length === 0) {
    return (
      <div className="panel-hi" style={{ padding: 14 }}>
        <div className="mono" style={{ fontSize: 9, color: BRAND.textDim, marginBottom: 4 }}>
          {name.toUpperCase()}
        </div>
        <div style={{ color: BRAND.textDim, fontSize: 11 }}>insufficient history</div>
      </div>
    );
  }

  const allMeans = block.calibration.map(r => r.mean_return).filter(v => v != null);
  if (allMeans.length === 0) {
    return (
      <div className="panel-hi" style={{ padding: 14 }}>
        <div className="mono" style={{ fontSize: 9, color: BRAND.textDim, marginBottom: 4 }}>
          {name.toUpperCase()} · n={block.n_total}
        </div>
        <div style={{ color: BRAND.textDim, fontSize: 11 }}>no return data — likely missing column upstream</div>
      </div>
    );
  }
  const yMin = Math.min(0, ...allMeans);
  const yMax = Math.max(0, ...allMeans);
  const xScale = d => P.left + ((d - 1) / 9) * cw;
  const yScale = v => P.top + (1 - (v - yMin) / (yMax - yMin || 1)) * ch;

  const fmtPct = v => v == null ? '—' : `${(v * 100 >= 0 ? '+' : '')}${(v * 100).toFixed(1)}%`;
  const spread26 = block.spread_top_minus_bottom?.['26w'];
  const spreadColor = spread26 == null ? BRAND.textDim : spread26 > 0 ? BRAND.green : BRAND.red;

  return (
    <div className="panel-hi" style={{ padding: 14 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 4 }}>
        <div className="mono" style={{ fontSize: 11, color: BRAND.text, letterSpacing: '0.12em', fontWeight: 600 }}>
          {name.toUpperCase()}
        </div>
        <div className="mono" style={{ fontSize: 9, color: BRAND.textDim, letterSpacing: '0.1em' }}>
          n={block.n_total}
        </div>
      </div>
      <div style={{ marginBottom: 8, fontSize: 11, color: BRAND.textMute, lineHeight: 1.4 }}>
        26w spread (top decile − bottom): <span className="mono" style={{ color: spreadColor, fontWeight: 600 }}>{fmtPct(spread26)}</span>
      </div>
      <div style={{ display: 'flex', gap: 4, marginBottom: 6 }}>
        {horizons.map(h => (
          <span key={h} className="mono" style={{
            fontSize: 8, color: block.monotonic && block.monotonic[`${h}w`] ? BRAND.green : BRAND.textDim,
            padding: '1px 5px', border: `1px solid ${BRAND.border}`, borderRadius: 2,
          }}>
            {h}w {block.monotonic && block.monotonic[`${h}w`] ? '✓' : ''}
          </span>
        ))}
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto', display: 'block' }}>
        <line x1={P.left} y1={yScale(0)} x2={P.left + cw} y2={yScale(0)}
              stroke={BRAND.textMute} strokeOpacity={0.4} strokeDasharray="2 4" />
        <text x={P.left - 6} y={yScale(yMax) + 3} fontSize={9} fill={BRAND.textDim}
              fontFamily="JetBrains Mono" textAnchor="end">{fmtPct(yMax)}</text>
        <text x={P.left - 6} y={yScale(0) + 3} fontSize={9} fill={BRAND.textDim}
              fontFamily="JetBrains Mono" textAnchor="end">0%</text>
        <text x={P.left - 6} y={yScale(yMin) + 3} fontSize={9} fill={BRAND.textDim}
              fontFamily="JetBrains Mono" textAnchor="end">{fmtPct(yMin)}</text>
        {[1, 5, 10].map(d => (
          <text key={d} x={xScale(d)} y={H - 8} fontSize={9} fill={BRAND.textDim}
                fontFamily="JetBrains Mono" textAnchor="middle">{d}</text>
        ))}
        <text x={P.left + cw / 2} y={H - 18} fontSize={9} fill={BRAND.textMute}
              fontFamily="JetBrains Mono" textAnchor="middle" letterSpacing="0.1em">DECILE (z-score, low → high)</text>
        {horizons.map(h => {
          const rows = block.calibration.filter(r => r.horizon_w === h && r.mean_return != null);
          if (rows.length === 0) return null;
          const path = rows.sort((a, b) => a.decile - b.decile)
                           .map((r, i) => `${i === 0 ? 'M' : 'L'}${xScale(r.decile)},${yScale(r.mean_return)}`)
                           .join(' ');
          return (
            <g key={h}>
              <path d={path} fill="none" stroke={horizonColors[h]} strokeWidth={1.5} opacity={0.85} />
              {rows.map(r => (
                <circle key={r.decile} cx={xScale(r.decile)} cy={yScale(r.mean_return)}
                        r={2.5} fill={horizonColors[h]} />
              ))}
            </g>
          );
        })}
      </svg>
    </div>
  );
}

      <div className="mono" style={{ fontSize: 16, color: color, fontWeight: 700 }}>{pass ? 'YES' : 'NO'}</div>

}

function EquityCurve({ points }) {
  if (!points || points.length === 0) {
    return <div style={{ color: BRAND.textDim, fontSize: 11, padding: 14 }}>Equity curve unavailable (no flagged events).</div>;
  }
  const W = 920, H = 240, P = { top: 18, right: 60, bottom: 32, left: 50 };
  const cw = W - P.left - P.right, ch = H - P.top - P.bottom;
  const allY = points.flatMap(p => [p.strategy, p.benchmark]);
  const yMin = Math.min(...allY) * 0.98;
  const yMax = Math.max(...allY) * 1.02;
  const xScale = i => P.left + (i / (Math.max(1, points.length - 1))) * cw;
  const yScale = v => P.top + (1 - (v - yMin) / (yMax - yMin || 1)) * ch;
  const pathFor = key => points.map((p, i) => `${i === 0 ? 'M' : 'L'}${xScale(i)},${yScale(p[key])}`).join(' ');
  const finalStrategy = points[points.length - 1].strategy;
  const finalBenchmark = points[points.length - 1].benchmark;
  const fmtX = v => `${v.toFixed(2)}x`;
  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 6 }}>
        <div className="mono" style={{ fontSize: 9, color: BRAND.textDim, letterSpacing: '0.15em' }}>
          EQUITY CURVE
        </div>
        <div style={{ display: 'flex', gap: 16, fontSize: 11, color: BRAND.textMute }}>
          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
            <span style={{ width: 14, height: 2, background: BRAND.green }}></span>
            Strategy <span className="mono" style={{ color: BRAND.text }}>{fmtX(finalStrategy)}</span>
          </span>
          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
            <span style={{ width: 14, height: 2, background: BRAND.textMute }}></span>
            Benchmark <span className="mono" style={{ color: BRAND.text }}>{fmtX(finalBenchmark)}</span>
          </span>
        </div>
      </div>
      <div style={{ fontSize: 10, color: BRAND.textDim, marginBottom: 4, fontStyle: 'italic' }}>
        Compounded equal-weight return on flagged commodities, vs ASX 200. Each tick is one signal week. {points.length} signal weeks total.
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto', display: 'block' }}>
        <line x1={P.left} y1={yScale(1.0)} x2={P.left + cw} y2={yScale(1.0)}
              stroke={BRAND.textMute} strokeOpacity={0.3} strokeDasharray="2 4" />
        <text x={P.left - 6} y={yScale(yMax) + 3} fontSize={9} fill={BRAND.textDim}
              fontFamily="JetBrains Mono" textAnchor="end">{fmtX(yMax)}</text>
        <text x={P.left - 6} y={yScale(1.0) + 3} fontSize={9} fill={BRAND.textDim}
              fontFamily="JetBrains Mono" textAnchor="end">1.00x</text>
        <text x={P.left - 6} y={yScale(yMin) + 3} fontSize={9} fill={BRAND.textDim}
              fontFamily="JetBrains Mono" textAnchor="end">{fmtX(yMin)}</text>
        <path d={pathFor('benchmark')} fill="none" stroke={BRAND.textMute} strokeWidth={1.2} strokeOpacity={0.85} />
        <path d={pathFor('strategy')}  fill="none" stroke={BRAND.green}    strokeWidth={2} />
        <text x={P.left}      y={H - 10} fontSize={9} fill={BRAND.textDim} fontFamily="JetBrains Mono">{points[0].date}</text>
        <text x={P.left + cw} y={H - 10} fontSize={9} fill={BRAND.textDim} fontFamily="JetBrains Mono" textAnchor="end">{points[points.length - 1].date}</text>
      </svg>
    </div>
  );
}

// ─── Main dashboard ──────────────────────────────────────────────────────
function HateIndexDashboard() {
  const [selected, setSelected] = useState(null);
  const [pinned, setPinned] = useState(null);
  const [liveData, setLiveData] = useState(null);
  const [asOf, setAsOf] = useState('— mock data —');
  const [build, setBuild] = useState('dev');

  // Load live data.json if present, else fall back to mocks
  useEffect(() => {
    fetch('./data.json')
      .then(r => r.ok ? r.json() : null)
      .then(j => {
        if (j) {
          setLiveData(j);
          setAsOf(j.as_of || '');
          setBuild(j.build || 'live');
        }
      })
      .catch(() => {});
  }, []);

  const data = useMemo(() => {
    if (liveData?.commodities) {
      // Map live JSON into the augmented shape
      return liveData.commodities.map(c => ({
        name: c.name,
        ticker: c.ticker,
        ...c.components,
        score: c.score,
        tail: c.rrg_tail,
        status: c.status,
        justEntered: c.just_entered,
        history: (c.score_history || []).map((p, i) => ({ w: i, v: p.score })),
        // new — for the detail panel
        components:    c.components,
        score_history: c.score_history,
        commentary:    c.commentary,
        constituents:  c.constituents,
      })).sort((a, b) => b.score - a.score);
    }
    const sparklines = Object.fromEntries(
      RAW.map((d, i) => [d.name, genSparkline(i * 137 + 11, d.drift, d.drawdown + d.momentum + d.positioning + d.flows + d.valuation + d.sentiment)])
    );
    return buildAugmented(RAW, RRG_DATA, sparklines);
  }, [liveData]);

  const flagged = data.filter(d => d.score >= 4 && d.justEntered);
  const mostHated = data[0] || { name: '—', score: 0 };
  const breadthHated = data.filter(d => d.score > 0).length;
  const stackedData = data.map(d => ({
    name: d.name, drawdown: d.drawdown, momentum: d.momentum, positioning: d.positioning,
    flows: d.flows, valuation: d.valuation, sentiment: d.sentiment,
  }));

  return (
    <div style={{
      minHeight: '100vh',
      background: `radial-gradient(1200px 600px at 10% -10%, ${BRAND.navy} 0%, transparent 60%), radial-gradient(800px 400px at 90% 110%, ${BRAND.blue}22 0%, transparent 70%), ${BRAND.bg}`,
      color: BRAND.text,
      padding: '24px 32px 40px',
    }}>
      <header style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: 28, paddingBottom: 18, borderBottom: `1px solid ${BRAND.border}` }}>
        <div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6 }}>
            <div style={{ width: 8, height: 8, background: BRAND.orange, borderRadius: '50%', boxShadow: `0 0 12px ${BRAND.orange}` }} />
            <span className="mono" style={{ fontSize: 10, color: BRAND.textMute, letterSpacing: '0.2em' }}>ZOVLYN · COMMODITY RESEARCH</span>
          </div>
          <h1 className="display" style={{ fontSize: 44, fontWeight: 500, margin: 0, lineHeight: 1 }}>
            Hate <em style={{ color: BRAND.orange, fontStyle: 'italic', fontWeight: 600 }}>Index</em>
          </h1>
          <p style={{ color: BRAND.textMute, fontSize: 13, margin: '8px 0 0', maxWidth: 600 }}>
            Composite z-score across six capitulation signals, mapped onto sector rotation. The buy zone: hated AND rotating into Improving / Leading.
          </p>
        </div>
        <div style={{ display: 'flex', gap: 24, alignItems: 'center' }}>
          <div style={{ textAlign: 'right' }}>
            <div className="mono" style={{ fontSize: 9, color: BRAND.textDim, letterSpacing: '0.15em' }}>LAST RUN</div>
            <div className="mono" style={{ fontSize: 13, color: BRAND.text, marginTop: 2 }}>{asOf}</div>
          </div>
          <div style={{ textAlign: 'right' }}>
            <div className="mono" style={{ fontSize: 9, color: BRAND.textDim, letterSpacing: '0.15em' }}>BUILD</div>
            <div className="mono" style={{ fontSize: 13, color: BRAND.text, marginTop: 2 }}>{build}</div>
          </div>
        </div>
      </header>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 14, marginBottom: 24 }}>
        <KpiCard label="MOST HATED" value={mostHated.name} sub={`Composite ${fmtScore(mostHated.score)}`} icon={<TrendingDown size={16} />} accent={BRAND.orange} />
        <KpiCard label="HATED & ROTATING" value={flagged.length.toString()} sub={flagged.length ? flagged.map(f => f.ticker).join(' · ') : 'no setups'} icon={<Target size={16} />} accent={BRAND.green} />
        <KpiCard label="BREADTH" value={`${breadthHated}/${data.length}`} sub="composite > 0" icon={<Activity size={16} />} accent={BRAND.purple} />
        <KpiCard label="DISPERSION" value={data.length ? (data[0].score - data[data.length-1].score).toFixed(1) : '—'} sub="top minus bottom" icon={<AlertCircle size={16} />} accent={BRAND.blue} />
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1.6fr 1fr', gap: 16, marginBottom: 16 }}>
        <div className="panel" style={{ padding: 20 }}>
          <div className="mono" style={{ fontSize: 9, color: BRAND.textDim, letterSpacing: '0.15em' }}>FIG 01 · COMPOSITE RANKING</div>
          <h2 className="display" style={{ fontSize: 22, fontWeight: 500, margin: '4px 0 0' }}>Hate score by component</h2>
          <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap', marginTop: 14, marginBottom: 8 }}>
            {Object.entries(COMPONENT_LABELS).map(([k, label]) => (
              <div key={k} style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <div style={{ width: 10, height: 10, background: COMPONENT_COLORS[k], borderRadius: 1 }} />
                <span className="mono" style={{ fontSize: 10, color: BRAND.textMute }}>{label}</span>
              </div>
            ))}
          </div>
          <div style={{ height: 440, marginTop: 8 }}>
            <ResponsiveContainer width="100%" height="100%">
              <BarChart data={stackedData} layout="vertical" margin={{ top: 6, right: 30, bottom: 6, left: 8 }}
                        onMouseMove={(e) => setSelected(e?.activeLabel || null)}
                        onMouseLeave={() => setSelected(null)}>
                <CartesianGrid strokeDasharray="2 4" stroke={BRAND.border} horizontal={false} />
                <XAxis type="number" tickLine={false} axisLine={{ stroke: BRAND.border }} domain={[-8, 14]} />
                <YAxis type="category" dataKey="name" tickLine={false} axisLine={false} width={84}
                       tick={(props) => {
                         const isSel = selected === props.payload.value;
                         return <text {...props} fill={isSel ? BRAND.orange : BRAND.textMute} fontFamily="JetBrains Mono" fontSize={10} fontWeight={isSel ? 600 : 400}>{props.payload.value}</text>;
                       }} />
                <Tooltip cursor={{ fill: `${BRAND.purple}1A` }}
                  contentStyle={{ background: BRAND.panelHi, border: `1px solid ${BRAND.border}`, borderRadius: 4, fontFamily: 'JetBrains Mono', fontSize: 11 }}
                  labelStyle={{ color: BRAND.text, fontWeight: 600, marginBottom: 4 }}
                  formatter={(value, name) => [fmtScore(value), COMPONENT_LABELS[name]]} />
                <ReferenceLine x={0} stroke={BRAND.textMute} strokeWidth={1} />
                <ReferenceLine x={4} stroke={BRAND.pink} strokeDasharray="3 3" strokeOpacity={0.4} />
                <ReferenceLine x={8} stroke={BRAND.orange} strokeDasharray="3 3" strokeOpacity={0.5} />
                {Object.keys(COMPONENT_LABELS).map(k => (
                  <Bar key={k} dataKey={k} stackId="a" fill={COMPONENT_COLORS[k]}>
                    {stackedData.map((entry, i) => (
                      <Cell key={i} fillOpacity={selected && selected !== entry.name ? 0.25 : 1} />
                    ))}
                  </Bar>
                ))}
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>

        <div className="panel" style={{ padding: 20, display: 'flex', flexDirection: 'column' }}>
          <div className="mono" style={{ fontSize: 9, color: BRAND.textDim, letterSpacing: '0.15em' }}>FIG 02 · 2YR EVOLUTION</div>
          <h2 className="display" style={{ fontSize: 22, fontWeight: 500, margin: '4px 0 14px' }}>Score history</h2>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 60px 1.2fr 70px', gap: 0, padding: '6px 8px', borderBottom: `1px solid ${BRAND.border}` }}>
            {['Commodity', 'Score', '2Y', 'Status'].map(h => (
              <div key={h} className="mono" style={{ fontSize: 9, color: BRAND.textDim, letterSpacing: '0.1em', textAlign: h === 'Commodity' ? 'left' : 'right' }}>{h.toUpperCase()}</div>
            ))}
          </div>
          <div style={{ flex: 1, overflowY: 'auto' }}>
            {data.map((d) => {
              const turning = d.score >= 4 && d.justEntered;
              const isSelected = selected === d.name;
              return (
                <div key={d.name}
                     className={`row-hover ${isSelected ? 'row-selected' : ''}`}
                     onMouseEnter={() => setSelected(d.name)}
                     onMouseLeave={() => setSelected(null)}
                     onClick={() => setPinned(d.name)}
                     style={{ display: 'grid', gridTemplateColumns: '1fr 60px 1.2fr 70px', gap: 0, padding: '8px', alignItems: 'center', borderBottom: `1px solid ${BRAND.border}40`, cursor: 'pointer' }}>
                  <div>
                    <div style={{ fontSize: 12, color: isSelected ? BRAND.orange : BRAND.text, fontWeight: 500 }}>{d.name}</div>
                    <div className="mono" style={{ fontSize: 9, color: BRAND.textDim }}>{d.ticker}</div>
                  </div>
                  <div className="mono" style={{ fontSize: 12, color: colorForScore(d.score), textAlign: 'right', fontWeight: 600 }}>
                    {fmtScore(d.score)}
                  </div>
                  <div style={{ height: 28 }}>
                    <Sparkline data={d.history || []} color={colorForScore(d.score)} />
                  </div>
                  <div className="mono" style={{ fontSize: 8, textAlign: 'right', color: turning ? BRAND.green : BRAND.textDim, letterSpacing: '0.05em' }}>
                    {(d.status || '').toUpperCase()}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      <div className="panel" style={{ padding: 20, marginBottom: 16 }}>
        <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: 4 }}>
          <div>
            <div className="mono" style={{ fontSize: 9, color: BRAND.textDim, letterSpacing: '0.15em' }}>FIG 03 · RELATIVE ROTATION GRAPH</div>
            <h2 className="display" style={{ fontSize: 22, fontWeight: 500, margin: '4px 0 0' }}>Sector rotation map</h2>
            <p style={{ fontSize: 12, color: BRAND.textMute, margin: '6px 0 0', maxWidth: 680 }}>
              Each tail traces 6 weeks of momentum vs ASX 200. Sectors rotate clockwise: Lagging → Improving → Leading → Weakening.
              Glow ring = HATED on the composite. Overlap of glow and Improving quadrant is the high-conviction setup.
            </p>
          </div>
          <div style={{ display: 'flex', gap: 18, alignItems: 'center' }}>
            <LegendDot dot={BRAND.orange} label="Capitulation (≥8σ)" />
            <LegendDot dot={BRAND.pink} label="Hated (≥4σ)" />
            <LegendDot dot={BRAND.purple} label="Neutral" />
            <LegendDot dot={BRAND.blue} label="Liked" />
          </div>
        </div>
        <div style={{ marginTop: 10 }}>
          <RRGPanel data={data} selected={selected} setSelected={setSelected} />
        </div>
      </div>

      <div className="panel" style={{ padding: 20, marginBottom: 16 }}>
        <div style={{ marginBottom: 12 }}>
          <div className="mono" style={{ fontSize: 9, color: BRAND.textDim, letterSpacing: '0.15em' }}>FIG 03.5 · COMMODITY DETAIL</div>
          <h2 className="display" style={{ fontSize: 22, fontWeight: 500, margin: '4px 0 0' }}>
            {(selected || pinned) || 'Pick a commodity'}
          </h2>
        </div>
        <CommodityDetailPanel data={data} selected={selected || pinned} setSelected={setSelected} />
      </div>

      <div className="panel" style={{ padding: 22 }}>
        <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between' }}>
          <div>
            <div className="mono" style={{ fontSize: 9, color: BRAND.textDim, letterSpacing: '0.15em' }}>FIG 04 · WEEKLY SIGNAL</div>
            <h2 className="display" style={{ fontSize: 22, fontWeight: 500, margin: '4px 0 0' }}>This week's setups</h2>
          </div>
          <div className="mono" style={{ fontSize: 10, color: BRAND.textMute }}>
            CRITERIA · COMPOSITE ≥ 4 AND JUST ENTERED IMPROVING/LEADING
          </div>
        </div>
        {flagged.length === 0 ? (
          <div className="panel-hi" style={{ padding: 20, marginTop: 14 }}>
            <div className="mono" style={{ fontSize: 11, color: BRAND.textMute }}>No commodities currently meet both criteria.</div>
          </div>
        ) : (
          <div style={{ display: 'grid', gridTemplateColumns: `repeat(${Math.min(flagged.length, 3)}, 1fr)`, gap: 14, marginTop: 16 }}>
            {flagged.map(f => (
              <SignalCard key={f.name} f={f} onHover={setSelected} selected={selected === f.name} />
            ))}
          </div>
        )}
        <div style={{ borderTop: `1px solid ${BRAND.border}`, paddingTop: 16, marginTop: 18 }}>
          <div className="mono" style={{ fontSize: 9, color: BRAND.textDim, letterSpacing: '0.15em', marginBottom: 8 }}>METHODOLOGY</div>
          <p style={{ fontSize: 11, color: BRAND.textMute, lineHeight: 1.6, margin: 0, maxWidth: 920 }}>
            Hate score: dual z-score per component (60% time-series 10yr, 40% cross-sectional), sign-flipped, equal-weighted, summed.
            RRG: JdK RS-Ratio = normalised price relative to ASX 200; RS-Momentum = rate of change of RS-Ratio. Both smoothed (window=10, smoothing=3, weekly bars).
            Sources: yfinance, CFTC COT, FRED, GDELT.
          </p>
        </div>
      </div>

      <div className="panel" style={{ padding: 22, marginTop: 16 }}>
        <div style={{ marginBottom: 14 }}>
          <div className="mono" style={{ fontSize: 9, color: BRAND.textDim, letterSpacing: '0.15em' }}>FIG 05 · BACKTEST · DOES THIS WORK?</div>
          <h2 className="display" style={{ fontSize: 22, fontWeight: 500, margin: '4px 0 0' }}>Out-of-sample evidence</h2>
        </div>
        <BacktestPanel />
      </div>

      <footer style={{ marginTop: 32, paddingTop: 20, borderTop: `1px solid ${BRAND.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <div className="mono" style={{ fontSize: 9, color: BRAND.textDim }}>ZOVLYN PTY LTD · GENERATED BY GITHUB ACTIONS</div>
        <div className="mono" style={{ fontSize: 9, color: BRAND.textDim }}>NOT INVESTMENT ADVICE · RESEARCH USE ONLY</div>
      </footer>
    </div>
  );
}

function KpiCard({ label, value, sub, icon, accent }) {
  return (
    <div className="panel" style={{ padding: '16px 18px', position: 'relative', overflow: 'hidden' }}>
      <div style={{ position: 'absolute', top: 0, right: 0, opacity: 0.06, color: accent, lineHeight: 0.8, transform: 'translate(20%, -20%)' }}>
        {icon && React.cloneElement(icon, { size: 80 })}
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
        <div style={{ color: accent }}>{icon}</div>
        <div className="mono" style={{ fontSize: 9, color: BRAND.textDim, letterSpacing: '0.15em' }}>{label}</div>
      </div>
      <div className="display" style={{ fontSize: 26, fontWeight: 600, marginTop: 6, color: BRAND.text }}>{value}</div>
      <div className="mono" style={{ fontSize: 10, color: BRAND.textMute, marginTop: 2 }}>{sub}</div>
    </div>
  );
}

function SignalCard({ f, onHover, selected }) {
  return (
    <div className="panel-hi"
         onMouseEnter={() => onHover(f.name)}
         onMouseLeave={() => onHover(null)}
         style={{
           padding: 18, position: 'relative', overflow: 'hidden',
           border: `1px solid ${selected ? BRAND.green : BRAND.border}`,
           transition: 'border-color 0.15s',
         }}>
      <div style={{ position: 'absolute', top: 0, left: 0, width: 3, height: '100%', background: BRAND.green }} />
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
        <div>
          <div className="display" style={{ fontSize: 24, fontWeight: 600, color: BRAND.text }}>{f.name}</div>
          <div className="mono" style={{ fontSize: 10, color: BRAND.textMute, marginTop: 2 }}>{f.ticker} · COMPOSITE {fmtScore(f.score)}</div>
        </div>
        <HateBadge score={f.score} />
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8, marginTop: 14 }}>
        <Stat label="Drawdown" value={fmtScore(f.drawdown)} />
        <Stat label="Positioning" value={fmtScore(f.positioning)} />
        <Stat label="Flows" value={fmtScore(f.flows)} />
      </div>
      <div className="mono" style={{ fontSize: 10, color: BRAND.green, marginTop: 14, display: 'flex', alignItems: 'center', gap: 6 }}>
        <Compass size={12} /> ROTATION · {(f.status || '').toUpperCase()}
      </div>
    </div>
  );
}

function Stat({ label, value }) {
  return (
    <div>
      <div className="mono" style={{ fontSize: 9, color: BRAND.textDim, letterSpacing: '0.1em' }}>{label.toUpperCase()}</div>
      <div className="mono" style={{ fontSize: 14, color: BRAND.text, fontWeight: 600, marginTop: 2 }}>{value}</div>
    </div>
  );
}

function LegendDot({ dot, label }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
      <div style={{ width: 8, height: 8, borderRadius: '50%', background: dot }} />
      <span className="mono" style={{ fontSize: 9, color: BRAND.textMute }}>{label}</span>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<HateIndexDashboard />);
</script>
</body>
</html>
