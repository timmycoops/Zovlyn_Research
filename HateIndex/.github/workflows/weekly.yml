name: Weekly refresh

on:
  schedule:
    # Saturday 08:00 AEST = Friday 22:00 UTC
    # CFTC drops Friday ~20:30 UTC, so we get a 90-min buffer.
    - cron: '0 22 * * 5'
  workflow_dispatch:        # manual trigger button on GitHub UI

permissions:
  contents: write           # required to commit refreshed data back to main

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -v tests/

      - name: Ingest prices
        run: python scripts/ingest_prices.py

      - name: Ingest CFTC
        run: python scripts/ingest_cftc.py
        continue-on-error: true   # CFTC ZIP can be flaky; non-fatal for Phase 2

      - name: Compute hate scores
        run: python scripts/compute_scores.py

      - name: Compute RRG
        run: python scripts/compute_rrg.py

      - name: Build site (data.json)
        run: python scripts/build_site.py

      # Phase 6: enable when backtest.py is implemented
      # - name: Run backtest
      #   run: python scripts/backtest.py

      - name: Commit refreshed data
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add data/ docs/data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: weekly refresh $(date -u +%Y-%m-%d)"
            git push
          fi
